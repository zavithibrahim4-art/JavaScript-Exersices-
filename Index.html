<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <p>Rock Paper Scissors</p>
    <button onclick="playGame('rock')">Rock</button>
    <button onclick="playGame('paper')">Paper</button>
    <button onclick="playGame('scissors')">Scissors</button>
    <button onclick="(localStorage.removeItem('score'))">
      Reset Score
    </button>

    <script>
      //this object will decide the score
      let score = JSON.parse(localStorage.getItem("score")) || {
        wins: 0,
        losses: 0,
        ties: 0,
      };
      /*
      if (score === null) {
        score = {wins: 0,
        losses: 0,
        ties: 0,
        };
      } else {
        JSON.parse(localStorage.getItem("score"))
      }
        */
      //this function picks the player move using if statements the result changes
      function playGame(playerMove) {
        const compMove = pickComputerMove();
        let result = "";
        if (playerMove === "scissors") {
          if (compMove === "rock") {
            result = "you lose";
          } else if (compMove === "paper") {
            result = "you won";
          } else {
            result = "tie";
          }
        } else if (playerMove === "paper") {
          if (compMove === "rock") {
            result = "you won";
          } else if (compMove === "paper") {
            result = "tie";
          } else {
            result = "you lose";
          }
        } else {
          if (compMove === "rock") {
            result = "tie";
          } else if (compMove === "paper") {
            result = "you lose";
          } else {
            result = "you won";
          }
        }
        if (result === "you lose") {
          score.losses += 1;
        } else if (result === "you won") {
          score.wins += 1;
        } else if (result === "tie") {
          score.ties += 1;
        }
        localStorage.setItem("score", JSON.stringify(score));
        alert(
          `You picked ${playerMove}. Computer picked ${compMove}.${result}.
wins: ${score.wins} | losses: ${score.losses} | ties: ${score.ties}`,
        );
        return result;
      }

      //this function picks the computer move

      function pickComputerMove() {
        let compMove = "";
        const randomNumber = Math.random();
        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          compMove = "rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          compMove = "paper";
        } else {
          compMove = "scissors";
        }
        return compMove;
      }
    </script>
  </body>
</html>
